name: 'taxi_dbt'
version: '1.0.0'
profile: 'taxi_dbt'

model-paths: ["models"]
macro-paths: ["macros"]

# Where each layer's models get built.
# staging models -> the `staging` dataset (as views, cheap/disposable)
# mart models    -> the `marts` dataset (as tables, queried by the dashboard)
models:
  taxi_dbt:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
